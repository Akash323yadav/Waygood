name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Backend Lint
      run: |
        cd backend
        npm install
        # npm run lint (assuming lint script exists)

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push Backend
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/ai-backend:${{ github.sha }} ./backend
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/ai-backend:${{ github.sha }}

    - name: Build and Push Worker
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/ai-worker:${{ github.sha }} ./worker
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/ai-worker:${{ github.sha }}

    - name: Build and Push Frontend
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/ai-frontend:${{ github.sha }} ./frontend
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/ai-frontend:${{ github.sha }}

  update-manifests:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Infra Repo
      uses: actions/checkout@v3
      with:
        repository: Akash323yadav/Waygood-infra
        token: ${{ secrets.GH_PAT }}

    - name: Update Image Tag
      run: |
        sed -i 's|image: .*/ai-backend:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/ai-backend:${{ github.sha }}|' backend.yaml
        sed -i 's|image: .*/ai-worker:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/ai-worker:${{ github.sha }}|' worker.yaml
        sed -i 's|image: .*/ai-frontend:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/ai-frontend:${{ github.sha }}|' frontend.yaml

    - name: Commit and Push
      run: |
        git config --global user.name 'github-actions'
        git config --global user.email 'github-actions@github.com'
        git add .
        git commit -m "Update images to ${{ github.sha }}"
        git push
